# Version : 1.4.0
# Modified: 2026-04-01 19:00 UTC
#
# Changes:
#   v1.4.0 - 2026-04-01 - Added rootzone section
#   v1.3.0 - 2026-04-01 - Added rdap.throttle_backoff
#   v1.2.0 - 2026-04-01 - Added validation.min_active_score
#   v1.1.0 - 2026-04-01 - Added output section
#   v1.0.0 - 2026-04-01 - Initial implementation
#
# Summary: Full reference configuration for dns-good with every available
#          knob documented. All values shown are the built-in defaults.
#          Copy to config.yaml and remove any field you don't need to change.
#          A missing file (or missing field) always falls back to the default.

db:
  path: dns-good.db             # SQLite file; created automatically if absent

validation:
  workers: 20                   # Parallel validation goroutines
  stale_ttl: 24h                # Entries older than this become STALE
  revalidate_delay: 4h          # Sleep between cycles in run mode
  timeout: 15s                  # Hard per-domain deadline
  min_active_score: 100         # Minimum trust score to qualify as ACTIVE (0–250).
                                # A domain must also have live DNS evidence (NS or A/AAAA).
                                # Common thresholds:
                                #    50 — NS records alone is enough
                                #   100 — DNS resolution alone, or delegation + 1 source (default)
                                #   150 — delegation + 2 sources required
                                #   250 — all four sources must confirm

output:
  dir: output                   # Directory for active/inactive/stale/unknown.txt
                                # Created automatically. Set to "" to disable.

rootzone:
  enabled: true                 # Download and cache the IANA root zone file.
                                #
                                # When enabled, the resolver skips the root server hop for
                                # any TLD whose nameservers have in-zone glue records (~90%
                                # of all TLDs). That saves 3 root queries per domain
                                # (NS + A + AAAA each start from root otherwise).
                                # Domains with an unknown TLD get an immediate NXDOMAIN
                                # without any network round trip.
                                #
                                # Disable only if the internic.net download is blocked.
                                # The resolver falls back to normal root-server behaviour
                                # seamlessly when this is false.

  url: "https://www.internic.net/domain/root.zone"
  cache_path: root.zone         # Local copy of the zone file; refreshed per refresh_ttl
  refresh_ttl: 24h              # Re-download after this period (root zone is stable;
                                # 24h is conservative — weekly would also be fine)

dns:
  # All 13 IANA root server IPv4 addresses. Used as fallback when rootzone
  # is disabled or a TLD has no in-zone glue. One is picked at random per
  # resolution attempt to spread load across the anycast clusters.
  root_servers:
    - "198.41.0.4"              # a.root-servers.net
    - "170.247.170.2"           # b.root-servers.net
    - "192.33.4.12"             # c.root-servers.net
    - "199.7.91.13"             # d.root-servers.net
    - "192.203.230.10"          # e.root-servers.net
    - "192.5.5.241"             # f.root-servers.net
    - "192.112.36.4"            # g.root-servers.net
    - "198.97.190.53"           # h.root-servers.net
    - "192.36.148.17"           # i.root-servers.net
    - "192.58.128.30"           # j.root-servers.net
    - "193.0.14.129"            # k.root-servers.net
    - "199.7.83.42"             # l.root-servers.net
    - "202.12.27.33"            # m.root-servers.net
  max_depth: 12                 # Max NS referral hops before failure
  retries: 2                    # UDP retry attempts per nameserver
  timeout: 5s                   # Per-query timeout; TCP fallback gets 2×

rdap:
  bootstrap_url: "https://data.iana.org/rdap/dns.json"
  cache_path: rdap-bootstrap.json
  cache_ttl: 48h
  timeout: 10s
  min_gap_ms: 500               # Min ms between requests to the same RDAP host (≈2 req/s)
  throttle_backoff: 5m          # How long to pause a host after HTTP 429.
                                # Retry-After header wins if it specifies longer.
                                # Affected domains are still scored via DNS+TOP-N
                                # and will pick up the RDAP score on next revalidation.

topn:
  provider: tranco
  url: "https://tranco-list.eu/top-1m.csv.zip"
  cache_path: tranco.csv
  refresh_ttl: 24h
  size: 1000000                 # Load top-N entries (lower = less memory)

