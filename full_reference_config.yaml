# Summary: Full reference configuration for dns-good with every available
#          knob documented. All values shown are the built-in defaults.

db:
  path: dns-good.db

validation:
  workers: 20
  stale_ttl: 24h
  revalidate_delay: 4h
  timeout: 15s
  min_active_score: 100

output:
  dir: output

rootzone:
  enabled: true
  url: "https://www.internic.net/domain/root.zone"
  cache_path: root.zone
  refresh_ttl: 24h

dns:
  root_servers:
    - "198.41.0.4"
    - "170.247.170.2"
    - "192.33.4.12"
    - "199.7.91.13"
    - "192.203.230.10"
    - "192.5.5.241"
    - "192.112.36.4"
    - "198.97.190.53"
    - "192.36.148.17"
    - "192.58.128.30"
    - "193.0.14.129"
    - "199.7.83.42"
    - "202.12.27.33"
  max_depth: 12
  retries: 2
  timeout: 5s

rdap:
  bootstrap_url: "https://data.iana.org/rdap/dns.json"
  cache_path: rdap-bootstrap.json
  cache_ttl: 48h
  timeout: 10s
  min_gap_ms: 500
  throttle_backoff: 5m

topn:
  provider: tranco
  url: "https://tranco-list.eu/top-1m.csv.zip"
  cache_path: tranco.csv
  refresh_ttl: 24h
  size: 1000000

